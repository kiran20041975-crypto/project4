apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-order
  namespace: ecommerce   # ✅ fixed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-order
  template:
    metadata:
      labels:
        app: mongo-order
    spec:
      containers:
        - name: mongo
          image: mongo
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
      volumes:
        - name: mongo-storage
          emptyDir: {}   # ⚠️ demo only (no persistence)
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-order
  namespace: ecommerce   # ✅ fixed
spec:
  selector:
    app: mongo-order
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP