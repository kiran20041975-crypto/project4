apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce   # ✅ FIXED
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: kiran1975/user-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_SECRET
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGO_USER_URL
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce   # ✅ FIXED
spec:
  selector:
    app: user-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP