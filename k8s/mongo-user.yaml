apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-user
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-user
  template:
    metadata:
      labels:
        app: mongo-user
    spec:
      containers:
        - name: mongo
          image: mongo
          ports:
            - containerPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: mongo-user
  namespace: ecommerce
spec:
  selector:
    app: mongo-user   # ✅ IMPORTANT
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP     # internal access