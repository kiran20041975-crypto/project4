apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce   # ✅ fixed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: kiran1975/project4:payment-service   # ✅ your image
          ports:
            - containerPort: 3004
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ecommerce   # ✅ fixed
spec:
  selector:
    app: payment-service
  ports:
    - port: 80           # 👈 external port
      targetPort: 3004   # 👈 container port
  type: LoadBalancer     # ✅ important