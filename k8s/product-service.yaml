apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce   # ✅ fixed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: kiran1975/project4:product-service   # ✅ your image
          ports:
            - containerPort: 3002
          env:
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGO_PRODUCT_URL
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: ecommerce   # ✅ fixed
spec:
  selector:
    app: product-service
  ports:
    - port: 80
      targetPort: 3002
  type: LoadBalancer   # ✅ important